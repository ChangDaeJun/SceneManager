name: ci

# main 브랜치 push/PR마다 빌드 + 테스트(릴리스는 만들지 않음).
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build
        run: dotnet build SceneManager.slnx -c Release --nologo

      - name: Test
        run: dotnet test tests/SceneManager.Core.Tests/SceneManager.Core.Tests.csproj -c Release --no-build --nologo
